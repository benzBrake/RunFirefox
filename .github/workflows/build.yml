name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v7

      - name: Install AutoIt3
        shell: pwsh
        run: '& .\scripts\install-autoit.ps1'

      - name: Inject Google API keys
        shell: pwsh
        env:
          CHROMIUM_GOOGLE_API_KEY: ${{ secrets.CHROMIUM_GOOGLE_API_KEY }}
          CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID: ${{ secrets.CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID }}
          CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET: ${{ secrets.CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'

          function ConvertTo-AutoItStringLiteral {
              param([string]$Value)

              if ($null -eq $Value) {
                  $Value = ''
              }

              $escaped = $Value.Replace('"', '""')
              return '"' + $escaped + '"'
          }

          function Set-ChromiumGoogleApiConstants {
              param([string[]]$Paths)

              $replacements = @{
                  ChromiumGoogleApiKey = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_API_KEY)
                  ChromiumGoogleClientId = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID)
                  ChromiumGoogleClientSecret = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET)
              }

              foreach ($path in $Paths) {
                  $source = Get-Content -LiteralPath $path -Raw
                  foreach ($name in $replacements.Keys) {
                      $pattern = '(?m)^Global Const \$' + [regex]::Escape($name) + ' = ".*"\r?$'
                      if ($source -notmatch $pattern) {
                          throw "Missing Chromium Google API constant: $name"
                      }
                      $line = 'Global Const $' + $name + ' = ' + $replacements[$name]
                      $source = [regex]::Replace($source, $pattern, $line)
                  }
                  Set-Content -LiteralPath $path -Value $source -Encoding utf8
              }
          }

          Set-ChromiumGoogleApiConstants -Paths @('.\RunFirefox.au3')

      - name: Compile RunFirefox
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $autoItPath = Join-Path $env:AUTOIT_DIR 'AutoIt3.exe'
          $wrapperPath = Join-Path $env:AUTOIT_DIR 'SciTE\AutoIt3Wrapper\AutoIt3Wrapper.au3'
          $scriptPath = Resolve-Path -LiteralPath '.\RunFirefox.au3'
          $arguments = "`"$wrapperPath`" /in `"$scriptPath`" /NoStatus"
          $process = Start-Process -FilePath $autoItPath -ArgumentList $arguments -NoNewWindow -Wait -PassThru

          if ($process.ExitCode -ne 0) {
              throw "AutoIt3Wrapper failed with exit code $($process.ExitCode)."
          }

          if (-not (Test-Path -LiteralPath '.\RunFirefox.exe')) {
              throw 'RunFirefox.exe was not produced.'
          }

      - name: Upload nightly artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/upload-artifact@v4
        with:
          name: RunFirefox-nightly-${{ github.run_number }}-${{ github.sha }}
          path: |
            RunFirefox.exe
            RunFirefox_x64.exe
          if-no-files-found: error
          retention-days: 14

  release:
    runs-on: windows-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write

    steps:
      - name: Debug Info
        shell: pwsh
        run: |
          "github.ref: $env:GITHUB_REF"
          "github.event_name: $env:GITHUB_EVENT_NAME"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install AutoIt3
        shell: pwsh
        run: '& .\scripts\install-autoit.ps1'

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
              throw "Release tag must match vX.Y.Z. Actual tag: $tag"
          }

          $version = $Matches.version
          $source = Get-Content -LiteralPath '.\RunFirefox.au3' -Raw
          $escapedVersion = [regex]::Escape($version)
          $fileVersionPattern = '(?m)^#AutoIt3Wrapper_Res_Fileversion={0}\.0\r?$' -f $escapedVersion
          $appVersionPattern = '(?m)^Global Const \$AppVersion = "{0}"\r?$' -f $escapedVersion

          if ($source -notmatch $fileVersionPattern) {
              throw "RunFirefox.au3 file version does not match $tag."
          }

          if ($source -notmatch $appVersionPattern) {
              throw "RunFirefox.au3 app version does not match $tag."
          }

          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            # Exclude the base Firefox icon.
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Inject Google API keys
        shell: pwsh
        env:
          CHROMIUM_GOOGLE_API_KEY: ${{ secrets.CHROMIUM_GOOGLE_API_KEY }}
          CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID: ${{ secrets.CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID }}
          CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET: ${{ secrets.CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'

          function ConvertTo-AutoItStringLiteral {
              param([string]$Value)

              if ($null -eq $Value) {
                  $Value = ''
              }

              $escaped = $Value.Replace('"', '""')
              return '"' + $escaped + '"'
          }

          function Set-ChromiumGoogleApiConstants {
              param([string[]]$Paths)

              $replacements = @{
                  ChromiumGoogleApiKey = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_API_KEY)
                  ChromiumGoogleClientId = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_DEFAULT_CLIENT_ID)
                  ChromiumGoogleClientSecret = (ConvertTo-AutoItStringLiteral -Value $env:CHROMIUM_GOOGLE_DEFAULT_CLIENT_SECRET)
              }

              foreach ($path in $Paths) {
                  $source = Get-Content -LiteralPath $path -Raw
                  foreach ($name in $replacements.Keys) {
                      $pattern = '(?m)^Global Const \$' + [regex]::Escape($name) + ' = ".*"\r?$'
                      if ($source -notmatch $pattern) {
                          throw "Missing Chromium Google API constant: $name"
                      }
                      $line = 'Global Const $' + $name + ' = ' + $replacements[$name]
                      $source = [regex]::Replace($source, $pattern, $line)
                  }
                  Set-Content -LiteralPath $path -Value $source -Encoding utf8
              }
          }

          $scripts = @(Get-ChildItem -Filter 'Run*.au3' | ForEach-Object { $_.FullName })
          if ($scripts.Count -eq 0) {
              throw 'No Run*.au3 scripts were found.'
          }

          Set-ChromiumGoogleApiConstants -Paths $scripts

      - name: Build scripts in parallel
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $autoItPath = Join-Path $env:AUTOIT_DIR 'AutoIt3.exe'
          $wrapperPath = Join-Path $env:AUTOIT_DIR 'SciTE\AutoIt3Wrapper\AutoIt3Wrapper.au3'
          $scripts = @(Get-ChildItem -Filter 'Run*.au3')

          if ($scripts.Count -eq 0) {
              throw 'No Run*.au3 scripts were found.'
          }

          $failures = @($scripts | ForEach-Object -Parallel {
              $arguments = "`"$using:wrapperPath`" /in `"$($_.FullName)`" /NoStatus"
              $process = Start-Process -FilePath $using:autoItPath -ArgumentList $arguments -NoNewWindow -Wait -PassThru
              if ($process.ExitCode -ne 0) {
                  $_.Name
              }
          } -ThrottleLimit 4)

          if ($failures.Count -gt 0) {
              $failedScripts = $failures -join ', '
              throw "AutoIt3Wrapper failed for: $failedScripts"
          }

      - name: Check the output
        shell: pwsh
        run: Get-ChildItem -Force

      - name: Package the binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = '${{ steps.version.outputs.VERSION }}'
          $exes = @(Get-ChildItem -Filter 'Run*.exe')

          if ($exes.Count -eq 0) {
              throw 'No Run*.exe files were produced.'
          }

          foreach ($exe in $exes) {
              if ($exe.BaseName.EndsWith('_x64', [StringComparison]::Ordinal)) {
                  $baseName = $exe.BaseName.Substring(0, $exe.BaseName.Length - 4)
                  $arch = '_x64'
              } else {
                  $baseName = $exe.BaseName
                  $arch = ''
              }

              $zipName = "$baseName`_$version$arch.zip"
              & 7z a -tzip $zipName $exe.FullName

              if ($LASTEXITCODE -ne 0) {
                  throw "7z failed while packaging $($exe.Name)."
              }
          }

      - name: Create changelog text
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $currentTag = '${{ github.ref_name }}'
          $ignoredPaths = @(
              'AGENTS.md',
              'AGENTS.local.md',
              'README.md',
              'docs/README-en_US.md'
          )
          $ignoredPathPrefixes = @(
              '.github/',
              'scripts/'
          )
          $excludedTypes = @('other', 'doc', 'docs', 'chore', 'ci')
          $typeTitlesEn = @{
              feat = 'Features'
              fix = 'Bug Fixes'
              perf = 'Performance'
              refactor = 'Refactoring'
              i18n = 'Internationalization'
          }
          $typeTitlesZh = @{
              feat = '功能'
              fix = '问题修复'
              perf = '性能优化'
              refactor = '重构'
              i18n = '国际化'
          }

          function Get-FileContentAtRef {
              param(
                  [string]$Ref,
                  [string]$Path
              )

              if ([string]::IsNullOrWhiteSpace($Ref)) {
                  return @()
              }

              $content = @(git show "$($Ref):$Path" 2>$null)
              if ($LASTEXITCODE -ne 0) {
                  return @()
              }

              return $content
          }

          function Get-UpdateEntries {
              param(
                  [string[]]$Content,
                  [string]$HeadingPattern
              )

              $entries = New-Object System.Collections.Generic.List[string]
              $inSection = $false

              foreach ($line in $Content) {
                  $trimmed = $line.Trim()
                  if (-not $inSection) {
                      if ($trimmed -match $HeadingPattern) {
                          $inSection = $true
                      }
                      continue
                  }

                  if ($trimmed -match '^#{1,6}\s+') {
                      break
                  }

                  if ([string]::IsNullOrWhiteSpace($trimmed)) {
                      continue
                  }

                  $entries.Add($trimmed)
              }

              return $entries
          }

          function Get-NewUpdateEntries {
              param(
                  [string]$Path,
                  [string]$HeadingPattern,
                  [string]$PreviousTag
              )

              $currentContent = @(Get-Content -LiteralPath $Path)
              $currentEntries = @(Get-UpdateEntries -Content $currentContent -HeadingPattern $HeadingPattern)
              $previousContent = @(Get-FileContentAtRef -Ref $PreviousTag -Path $Path)
              $previousEntries = @(Get-UpdateEntries -Content $previousContent -HeadingPattern $HeadingPattern)

              if ($previousEntries.Count -eq 0) {
                  return $currentEntries
              }

              $previousSet = [System.Collections.Generic.HashSet[string]]::new([StringComparer]::Ordinal)
              foreach ($entry in $previousEntries) {
                  [void]$previousSet.Add($entry)
              }

              $newEntries = New-Object System.Collections.Generic.List[string]
              foreach ($entry in $currentEntries) {
                  if (-not $previousSet.Contains($entry)) {
                      $newEntries.Add($entry)
                  }
              }

              return $newEntries
          }

          function Get-TypeTitle {
              param(
                  [string]$Type,
                  [string]$Language
              )

              if ($Language -eq 'zh-CN' -and $typeTitlesZh.ContainsKey($Type)) {
                  return $typeTitlesZh[$Type]
              }

              if ($typeTitlesEn.ContainsKey($Type)) {
                  return $typeTitlesEn[$Type]
              }

              return $Type.Substring(0, 1).ToUpperInvariant() + $Type.Substring(1)
          }

          function Add-ReadmeReleaseSection {
              param(
                  [System.Collections.Generic.List[string]]$Lines,
                  [string]$Title,
                  [string[]]$Entries,
                  [string]$EmptyText
              )

              $Lines.Add("## $Title")
              $Lines.Add('')

              if ($Entries.Count -eq 0) {
                  $Lines.Add("- $EmptyText")
              } else {
                  foreach ($entry in $Entries) {
                      $Lines.Add("- $entry")
                  }
              }

              $Lines.Add('')
          }

          function Add-CommitReleaseSection {
              param(
                  [System.Collections.Generic.List[string]]$Lines,
                  [string]$Title,
                  [string]$Language,
                  [System.Collections.Specialized.OrderedDictionary]$Groups,
                  [string]$EmptyText
              )

              $Lines.Add("## $Title")
              $Lines.Add('')

              if ($Groups.Count -eq 0) {
                  $Lines.Add("- $EmptyText")
                  $Lines.Add('')
                  return
              }

              foreach ($group in $Groups.GetEnumerator()) {
                  $Lines.Add("### $(Get-TypeTitle -Type $group.Key -Language $Language)")
                  $Lines.Add('')
                  foreach ($item in $group.Value) {
                      $Lines.Add($item)
                  }
                  $Lines.Add('')
              }
          }

          function Test-IgnoredReleaseNoteCommit {
              param([string]$Sha)

              $files = @(git show --pretty=format: --name-only $Sha | Where-Object { $_ })
              if ($files.Count -eq 0) {
                  return $false
              }

              foreach ($file in $files) {
                  $normalized = $file -replace '\\', '/'
                  $isIgnoredPath = $ignoredPaths -contains $normalized
                  foreach ($prefix in $ignoredPathPrefixes) {
                      if ($normalized.StartsWith($prefix, [StringComparison]::Ordinal)) {
                          $isIgnoredPath = $true
                          break
                      }
                  }

                  if (-not $isIgnoredPath) {
                      return $false
                  }
              }

              return $true
          }

          $previousTag = git tag --sort=-version:refname --merged HEAD |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' -and $_ -ne $currentTag } |
              Select-Object -First 1

          $commitRange = if ($previousTag) { "$previousTag..HEAD" } else { 'HEAD' }
          $commits = @(git log --reverse --format='%H%x09%s' $commitRange)
          $groups = [ordered]@{}

          foreach ($commit in $commits) {
              $parts = $commit -split "`t", 2
              $sha = $parts[0]
              $subject = $parts[1]

              if (Test-IgnoredReleaseNoteCommit -Sha $sha) {
                  continue
              }

              $type = 'other'
              $text = $subject
              if ($subject -match '^(?<type>[a-zA-Z]+)(?:\([^)]+\))?!?:\s*(?<text>.+)$') {
                  $type = $Matches.type.ToLowerInvariant()
                  $text = $Matches.text
              }

              if ($excludedTypes -contains $type) {
                  continue
              }

              if (-not $groups.Contains($type)) {
                  $groups[$type] = New-Object System.Collections.Generic.List[string]
              }

              $groups[$type].Add("- $text ($($sha.Substring(0, 7)))")
          }

          $zhEntries = @(Get-NewUpdateEntries -Path 'README.md' -HeadingPattern '^###\s+最近更新\s*$' -PreviousTag $previousTag)
          $enEntries = @(Get-NewUpdateEntries -Path 'docs/README-en_US.md' -HeadingPattern '^###\s+Latest updates\s*$' -PreviousTag $previousTag)
          $lines = New-Object System.Collections.Generic.List[string]

          if ($zhEntries.Count -gt 0 -or $enEntries.Count -gt 0) {
              Add-ReadmeReleaseSection -Lines $lines -Title '中文' -Entries $zhEntries -EmptyText '暂无发布相关变更。'
              Add-ReadmeReleaseSection -Lines $lines -Title 'English' -Entries $enEntries -EmptyText 'No release-relevant changes.'
          } else {
              Add-CommitReleaseSection -Lines $lines -Title '中文' -Language 'zh-CN' -Groups $groups -EmptyText '暂无发布相关变更。'
              Add-CommitReleaseSection -Lines $lines -Title 'English' -Language 'en-US' -Groups $groups -EmptyText 'No release-relevant changes.'
          }

          $changes = ($lines -join "`n").Trim()
          Set-Content -LiteralPath '.\release-notes.md' -Value $changes -Encoding utf8

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = '${{ github.ref_name }}'
          $assets = @(Get-ChildItem -Filter '*.zip' | ForEach-Object { $_.FullName })

          if ($assets.Count -eq 0) {
              throw 'No zip assets were found.'
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
              gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $tag --notes-file '.\release-notes.md'
              if ($LASTEXITCODE -ne 0) {
                  throw "Failed to update release $tag."
              }

              foreach ($asset in $assets) {
                  gh release upload $tag $asset --repo $env:GITHUB_REPOSITORY --clobber
                  if ($LASTEXITCODE -ne 0) {
                      throw "Failed to upload release asset: $asset"
                  }
              }
          } else {
              $createArgs = @(
                  'release',
                  'create',
                  $tag
              ) + $assets + @(
                  '--repo',
                  $env:GITHUB_REPOSITORY,
                  '--title',
                  $tag,
                  '--notes-file',
                  '.\release-notes.md',
                  '--verify-tag'
              )

              gh @createArgs
              if ($LASTEXITCODE -ne 0) {
                  throw "Failed to create release $tag."
              }
          }
