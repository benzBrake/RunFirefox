name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Debug Info
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
        shell: bash

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install AutoIt3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installers = @(
              @{
                  Url = 'https://www.autoitscript.com/files/autoit3/autoit-v3-setup.exe'
                  FileName = 'autoit-v3-setup.exe'
                  Arguments = @('/S')
              },
              @{
                  Url = 'https://www.autoitscript.com/autoit3/scite/download/SciTE4AutoIt3.exe'
                  FileName = 'SciTE4AutoIt3.exe'
                  Arguments = @('/S')
              }
          )

          foreach ($installer in $installers) {
              $installerPath = Join-Path $env:RUNNER_TEMP $installer.FileName
              Invoke-WebRequest -Uri $installer.Url -OutFile $installerPath

              $process = Start-Process `
                  -FilePath $installerPath `
                  -ArgumentList ([string[]]$installer.Arguments) `
                  -Wait `
                  -PassThru

              if ($process.ExitCode -ne 0) {
                  throw "$($installer.FileName) failed with exit code $($process.ExitCode)"
              }
          }

          $candidateDirs = @(
              (Join-Path ${env:ProgramFiles} 'AutoIt3'),
              (Join-Path ${env:ProgramFiles(x86)} 'AutoIt3')
          )
          $autoItDir = $candidateDirs |
              Where-Object { Test-Path -LiteralPath (Join-Path $_ 'AutoIt3.exe') } |
              Select-Object -First 1

          if (-not $autoItDir) {
              $searched = $candidateDirs -join ', '
              throw "AutoIt3.exe was not found. Searched: $searched"
          }

          $stripperZip = Join-Path $env:RUNNER_TEMP 'Au3Stripper.zip'
          Invoke-WebRequest `
              -Uri 'https://www.autoitscript.com/autoit3/scite/download/Au3Stripper.zip' `
              -OutFile $stripperZip

          $stripperDir = Join-Path $autoItDir 'SciTE\au3Stripper'
          Remove-Item -LiteralPath $stripperDir -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $stripperZip -DestinationPath $stripperDir -Force

          $autoItPath = Join-Path $autoItDir 'AutoIt3.exe'
          $wrapperPath = Join-Path $autoItDir 'SciTE\AutoIt3Wrapper\AutoIt3Wrapper.au3'

          if (-not (Test-Path -LiteralPath $autoItPath)) {
              throw "AutoIt3.exe was not found at $autoItPath"
          }

          if (-not (Test-Path -LiteralPath $wrapperPath)) {
              throw "AutoIt3Wrapper.au3 was not found at $wrapperPath"
          }

          "AutoIt installed at $autoItDir"
          "AUTOIT_DIR=$autoItDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $autoItDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update the version
        shell: bash
        run: |
          sed -i "s/#AutoIt3Wrapper_Res_Fileversion.*/#AutoIt3Wrapper_Res_Fileversion=${{ steps.get_version.outputs.VERSION }}.0/" RunFirefox.au3
          sed -i "s/Global Const \$AppVersion.*/Global Const \$AppVersion = \"${{ steps.get_version.outputs.VERSION }}\"/" RunFirefox.au3

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            # 排除原始Firefox图标
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Build scripts in parallel
        shell: pwsh
        run: |
          $autoItPath = Join-Path $env:AUTOIT_DIR "AutoIt3.exe"
          $wrapperPath = Join-Path $env:AUTOIT_DIR "SciTE\AutoIt3Wrapper\AutoIt3Wrapper.au3"
          
          # 获取所有需要编译的.au3文件
          $scripts = Get-ChildItem -Filter *.au3
          
          # 并行编译，最多4个同时运行
          $scripts | ForEach-Object -Parallel {
              Start-Process -FilePath $using:autoItPath -ArgumentList "`"$using:wrapperPath`" /in `"$($_.FullName)`" /NoStatus" -NoNewWindow -Wait
          } -ThrottleLimit 4

      - name: Check the output
        shell: bash
        run: |
          ls -l

      - name: Package the binaries
        shell: bash
        run: |
          # 仅处理以Run开头的exe文件
          for exe in Run*.exe; do
            # 提取基础名称和架构标识
            if [[ "$exe" == *_x64.exe ]]; then
              basename="${exe%_x64.exe}"
              arch="_x64"
            else
              basename="${exe%.exe}"
              arch=""
            fi
            
            # 生成最终文件名
            zip_name="${basename}_${{ steps.get_version.outputs.VERSION }}${arch}.zip"
            
            # 打包命令
            7z a -tzip "$zip_name" "$exe"
          done

      - uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: "*.zip"
          tags: true
          draft: false
          overwrite: true

      - name: Create changelog text
        id: changelog
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $currentTag = '${{ github.ref_name }}'
          $ignoredPaths = @(
              'AGENTS.md',
              'README.md',
              'README-en_US.md'
          )
          $ignoredPathPrefixes = @(
              'scripts/'
          )
          $excludedTypes = @('other', 'doc', 'docs', 'chore')
          $typeTitles = @{
              feat = 'Features'
              fix = 'Bug Fixes'
              perf = 'Performance'
              refactor = 'Refactoring'
              i18n = 'Internationalization'
          }

          function Test-IgnoredReleaseNoteCommit {
              param([string]$Sha)

              $files = @(git show --pretty=format: --name-only $Sha | Where-Object { $_ })
              if ($files.Count -eq 0) {
                  return $false
              }

              foreach ($file in $files) {
                  $normalized = $file -replace '\\', '/'
                  $isIgnoredPath = $ignoredPaths -contains $normalized
                  foreach ($prefix in $ignoredPathPrefixes) {
                      if ($normalized.StartsWith($prefix, [StringComparison]::Ordinal)) {
                          $isIgnoredPath = $true
                          break
                      }
                  }

                  if (-not $isIgnoredPath) {
                      return $false
                  }
              }

              return $true
          }

          $previousTag = git tag --sort=-version:refname --merged HEAD |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' -and $_ -ne $currentTag } |
              Select-Object -First 1

          $commitRange = if ($previousTag) { "$previousTag..HEAD" } else { 'HEAD' }
          $commits = @(git log --reverse --format='%H%x09%s' $commitRange)
          $groups = [ordered]@{}

          foreach ($commit in $commits) {
              $parts = $commit -split "`t", 2
              $sha = $parts[0]
              $subject = $parts[1]

              if (Test-IgnoredReleaseNoteCommit -Sha $sha) {
                  continue
              }

              $type = 'other'
              $text = $subject
              if ($subject -match '^(?<type>[a-zA-Z]+)(?:\([^)]+\))?!?:\s*(?<text>.+)$') {
                  $type = $Matches.type.ToLowerInvariant()
                  $text = $Matches.text
              }

              if ($excludedTypes -contains $type) {
                  continue
              }

              $title = if ($typeTitles.ContainsKey($type)) { $typeTitles[$type] } else { $type.Substring(0, 1).ToUpperInvariant() + $type.Substring(1) }
              if (-not $groups.Contains($title)) {
                  $groups[$title] = New-Object System.Collections.Generic.List[string]
              }

              $groups[$title].Add("- $text ($($sha.Substring(0, 7)))")
          }

          $lines = New-Object System.Collections.Generic.List[string]
          if ($groups.Count -eq 0) {
              $lines.Add('No release-relevant changes.')
          } else {
              foreach ($group in $groups.GetEnumerator()) {
                  $lines.Add("### $($group.Key)")
                  $lines.Add('')
                  foreach ($item in $group.Value) {
                      $lines.Add($item)
                  }
                  $lines.Add('')
              }
          }

          $changes = ($lines -join "`n").Trim()
          "changes<<CHANGELOG" >> $env:GITHUB_OUTPUT
          $changes >> $env:GITHUB_OUTPUT
          "CHANGELOG" >> $env:GITHUB_OUTPUT

      - name: Update release
        uses: ColinPitrat/update-release@v1.0.1
        with:
          files: "README.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.changes }}

      - uses: EndBug/add-and-commit@v9
        with:
          push: origin HEAD:master
          add: "*.txt RunFirefox.au3"
          fetch: true
          message: "Bump update information"
